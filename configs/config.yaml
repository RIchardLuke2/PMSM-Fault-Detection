seed: 42

data:
  raw_path: "data/converted_dataset.csv"
  features: ["Ia", "Ib", "VDC", "IDC", "T1", "T2", "T3", "VD"]
  target: "FDD"
  test_size: 0.15
  val_size:  0.15

windowing:
  window_size: 10
  stride: 5

model:
  num_classes: 9
  filters: [64, 128, 64]
  lstm_units: 128
  dropout: 0.4
  l2_reg: 0.0001
  attention: true
  residual: true
  branches:
    current_branch: ["Ia", "Ib"]
    voltage_branch: ["VDC", "VD"]
    thermal_branch: ["T1", "T2", "T3"]
    dc_branch:      ["IDC"]

training:
  epochs: 100
  batch_size: 256
  learning_rate: 0.001
  early_stopping_patience: 12
  reduce_lr_patience: 5
  reduce_lr_factor: 0.5
  class_weights: true

robustness:
  noise_levels:  [0.0, 0.01, 0.05, 0.10, 0.20, 0.50]
  window_sizes:  [5, 10, 20, 30]
  strides:       [1, 5, 10]

paths:
  model_path:   "outputs/models/pmsm_cnn_bilstm.pt"
  scaler_path:  "outputs/models/scaler.pkl"
  encoder_path: "outputs/models/encoder.pkl"
  config_save:  "outputs/models/config_saved.yaml"
  plots_dir:    "outputs/plots"
  metrics_dir:  "outputs/metrics"